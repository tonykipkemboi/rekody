name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - run: cargo fmt --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace

      # Verify tarball names in cmd_update (main.rs) and install.sh match release.yml.
      # Catches filename drift before it ships.
      - name: Check release/update/install filename consistency
        run: |
          FAIL=0

          # ── cmd_update (main.rs) ──────────────────────────────────────────────
          UPDATE_PATTERN=$(grep 'let tarball = format!' crates/chamgei-core/src/main.rs | \
            sed 's/.*format!("\(.*\)".*/\1/')
          echo "cmd_update pattern : $UPDATE_PATTERN"

          if echo "$UPDATE_PATTERN" | grep -qE 'chamgei-v\{'; then
            echo "ERROR: cmd_update has spurious 'v' prefix in tarball name"
            FAIL=1
          fi
          if grep -A2 '"aarch64"' crates/chamgei-core/src/main.rs | grep -q '"arm64"'; then
            echo "ERROR: cmd_update maps aarch64 -> arm64 but release.yml uses aarch64"
            FAIL=1
          fi

          # ── install.sh ────────────────────────────────────────────────────────
          INSTALL_TARBALL=$(grep 'TARBALL=' install.sh | grep -v '#' | head -1 | \
            sed 's/.*TARBALL="\(.*\)".*/\1/')
          echo "install.sh pattern : $INSTALL_TARBALL"

          # Must use VERSION_NUM (no v prefix) not VERSION
          if grep 'TARBALL=' install.sh | grep -v '#' | grep -q '"\${VERSION}-'; then
            echo "ERROR: install.sh uses \${VERSION} (includes 'v') in tarball name — use \${VERSION_NUM}"
            FAIL=1
          fi
          if grep -A2 'arm64|aarch64' install.sh | grep -q 'arm64"'; then
            echo "ERROR: install.sh maps aarch64 -> arm64 but release.yml uses aarch64"
            FAIL=1
          fi

          [ $FAIL -eq 0 ] && echo "OK: all filename patterns are consistent"
          exit $FAIL
